<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" width="1000" height="640" role="img" aria-label="Stylized placeholder map of Exandria">
  <defs>
    <radialGradient id="sea" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#1c1012"/>
      <stop offset="60%" stop-color="#100b0d"/>
      <stop offset="100%" stop-color="#0a0708"/>
    </radialGradient>
    <linearGradient id="land" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#23191b"/>
      <stop offset="100%" stop-color="#171012"/>
    </linearGradient>
    <radialGradient id="trench" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b3122a" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#b3122a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#b3122a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1000" height="640" fill="url(#sea)"/>

  <!-- subtle latitude/longitude grid -->
  <g stroke="#2c2427" stroke-width="1" opacity="0.5">
    <line x1="0" y1="160" x2="1000" y2="160"/>
    <line x1="0" y1="320" x2="1000" y2="320"/>
    <line x1="0" y1="480" x2="1000" y2="480"/>
    <line x1="250" y1="0" x2="250" y2="640"/>
    <line x1="500" y1="0" x2="500" y2="640"/>
    <line x1="750" y1="0" x2="750" y2="640"/>
  </g>

  <!-- Wildemount (left landmass) -->
  <path d="M40 130 q70 -40 160 -20 q60 -30 120 10 q50 -5 60 60 q40 30 10 90 q20 70 -50 110 q10 80 -80 110 q-70 40 -150 10 q-60 -40 -50 -120 q-50 -60 -10 -140 q-30 -70 40 -110 z"
        fill="url(#land)" stroke="#3a2a2d" stroke-width="2"/>
  <text x="190" y="300" fill="#c2c6cf" font-family="Cinzel, Georgia, serif" font-size="30" letter-spacing="4" text-anchor="middle" opacity="0.9">WILDEMOUNT</text>
  <circle cx="150" cy="380" r="4" fill="#e2425a"/>
  <text x="162" y="385" fill="#b7b3b8" font-family="EB Garamond, Georgia, serif" font-size="20">Jigow</text>

  <!-- Marquet (right landmass) -->
  <path d="M740 150 q80 -30 150 0 q70 -10 70 70 q40 50 0 120 q30 80 -60 120 q-60 50 -150 30 q-80 -10 -90 -90 q-40 -60 0 -130 q-20 -80 80 -120 z"
        fill="url(#land)" stroke="#3a2a2d" stroke-width="2"/>
  <text x="855" y="320" fill="#c2c6cf" font-family="Cinzel, Georgia, serif" font-size="30" letter-spacing="4" text-anchor="middle" opacity="0.9">MARQUET</text>
  <circle cx="845" cy="250" r="4" fill="#e2425a"/>
  <text x="857" y="255" fill="#b7b3b8" font-family="EB Garamond, Georgia, serif" font-size="20">Ank'Harel</text>

  <!-- The Netherdeep — a red wound in the middle of the Lucidian Ocean -->
  <ellipse cx="500" cy="340" rx="180" ry="150" fill="url(#trench)"/>
  <g stroke="#e2425a" stroke-width="1.5" fill="none" opacity="0.7">
    <ellipse cx="500" cy="340" rx="60" ry="48"/>
    <ellipse cx="500" cy="340" rx="100" ry="82"/>
    <ellipse cx="500" cy="340" rx="140" ry="116"/>
  </g>
  <text x="500" y="345" fill="#e2425a" font-family="Cinzel, Georgia, serif" font-size="20" letter-spacing="3" text-anchor="middle">THE NETHERDEEP</text>
  <text x="500" y="372" fill="#7e7a80" font-family="EB Garamond, Georgia, serif" font-size="15" text-anchor="middle" font-style="italic">Lucidian Ocean</text>

  <!-- compass rose -->
  <g transform="translate(905 545)" stroke="#c2c6cf" fill="#c2c6cf" opacity="0.8">
    <polygon points="0,-34 7,0 0,34 -7,0" />
    <polygon points="-34,0 0,7 34,0 0,-7" fill="#7e7a80"/>
    <text x="0" y="-40" font-family="Cinzel, serif" font-size="14" text-anchor="middle">N</text>
  </g>

  <!-- frame -->
  <rect x="8" y="8" width="984" height="624" fill="none" stroke="#3a2a2d" stroke-width="2"/>
  <rect x="16" y="16" width="968" height="608" fill="none" stroke="#2c2427" stroke-width="1"/>

  <text x="32" y="612" fill="#7e7a80" font-family="EB Garamond, Georgia, serif" font-size="16" font-style="italic">Sample placeholder map — replace maps/map-exandria.svg with your own.</text>
</svg>
